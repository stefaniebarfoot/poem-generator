<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Poem Generator</title>
  </head>
  <body>
    <header>
      <h1>AI Poem Generator</h1>
    </header>

    <main>
      <form>
        <input
          type="text"
          placeholder="enter the topic of the poem"
          autofocus
          required
          autocomplete="off"
        />
        <input type="submit" />
      </form>
      <div>
        The Poem will go here
        <br />
      </div>
    </main>
    <footer>
      This project was coded by
      <a href="https://github.com/stefaniebarfoot" target="blank"
        >Stefanie Barfoot</a
      >
      and is open-sourced on
      <a href="https://github.com/stefaniebarfoot/poem-generator" target="blank"
        >GitHub
      </a>
      and is hosted on
      <a href="https://poem-generator-beryl.vercel.app/">Vercel</a>
    </footer>

    <script src="src/index.js"></script>
  </body>
</html>
